<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<title>Farm A-B Lightbar</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AB Lightbar">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  html, body {
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    color:#fff;
    font-family:Arial, Helvetica, sans-serif;
    text-align:center;
    -webkit-user-select:none;
    user-select:none;
    -webkit-touch-callout:none;
  }

  #app {
    width:100vw;
    height:100vh;
    box-sizing:border-box;
    padding:4px 6px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }

  #installHint {
    display:none;
    font-size:13px;
    color:#ffff00;
    height:16px;
    line-height:16px;
  }

  #top {
    height:46px;
    display:flex;
    flex-direction:row;
    align-items:center;
    justify-content:space-between;
    gap:6px;
    flex-shrink:0;
    position:relative;
  }

  #gpsMeter {
    position:absolute;
    right:4px;
    top:4px;
    width:92px;
    height:34px;
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:3px;
    padding:2px;
    box-sizing:border-box;
    border:1px solid #555;
    border-radius:5px;
    background:#111;
  }

  .gpsBar {
    width:16px;
    background:#333;
    border-radius:2px;
  }

  #bar1 { height:8px; }
  #bar2 { height:14px; }
  #bar3 { height:20px; }
  #bar4 { height:26px; }

  #gpsStrengthText {
    position:absolute;
    right:4px;
    top:38px;
    width:92px;
    height:12px;
    font-size:10px;
    line-height:10px;
    color:#aaa;
    text-align:center;
  }

  .topBox {
    font-size:17px;
    font-weight:bold;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  #gpsStatus { width:34%; text-align:left; }
  #gpsDetail { width:36%; color:#bbb; font-size:13px; }
  #speed { width:18%; }
  #width { width:30%; text-align:right; padding-right:100px; box-sizing:border-box; }

  #main {
    flex:1;
    min-height:0;
    display:flex;
    flex-direction:row;
    align-items:center;
    justify-content:center;
    gap:8px;
    overflow:hidden;
  }

  #leftPanel, #rightPanel {
    width:25%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:6px;
  }

  #centrePanel {
    width:50%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    overflow:hidden;
  }

  #offset {
    font-size:52px;
    line-height:58px;
    font-weight:bold;
    min-height:64px;
  }

  #arrow {
    font-size:92px;
    line-height:94px;
    font-weight:bold;
    min-height:96px;
  }

  #coords {
    font-size:13px;
    color:#aaa;
    height:16px;
  }

  #bottom {
    height:112px;
    flex-shrink:0;
    display:grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(2, 52px);
    gap:4px;
    padding-top:4px;
    box-sizing:border-box;
  }

  button {
    font-size:18px;
    font-weight:bold;
    border-radius:8px;
    border:0;
    color:#1877ff;
    background:#f2f2f2;
    padding:0;
    height:52px;
  }

  .sideButton {
    height:48px;
    font-size:17px;
  }

  .green { color:#00ff00; }
  .yellow { color:#ffff00; }
  .red { color:#ff4444; }
  .white { color:#ffffff; }

  #portraitWarning {
    display:none;
  }

  @media (orientation: portrait) {
    #app { display:none; }
    #portraitWarning {
      display:flex;
      width:100vw;
      height:100vh;
      align-items:center;
      justify-content:center;
      background:#000;
      color:#ffff00;
      font-size:34px;
      font-weight:bold;
      text-align:center;
      padding:20px;
      box-sizing:border-box;
    }
  }

  @media (max-height: 430px) {
    #top { height:40px; }
    .topBox { font-size:15px; }
    #gpsDetail, #coords { font-size:12px; }
    #offset { font-size:46px; line-height:50px; min-height:54px; }
    #arrow { font-size:78px; line-height:80px; min-height:82px; }
    #bottom { height:98px; grid-template-rows: repeat(2, 46px); }
    button { height:46px; font-size:16px; }
    .sideButton { height:42px; font-size:15px; }
  }
</style>
</head>
<body>
<div id="portraitWarning">Turn iPad sideways<br>Landscape mode required</div>

<div id="app">
  <div id="installHint">For full screen: Safari Share → Add to Home Screen, then open from the icon.</div>

  <div id="top">
    <div id="gpsStatus" class="topBox red">GPS: NOT STARTED</div>
    <div id="gpsDetail" class="topBox">Tap START GPS outside.</div>
    <div id="speed" class="topBox">0.0 km/h</div>
    <div id="width" class="topBox">Width 8.0m | Sw 0</div>
    <div id="gpsMeter">
      <div id="bar1" class="gpsBar"></div>
      <div id="bar2" class="gpsBar"></div>
      <div id="bar3" class="gpsBar"></div>
      <div id="bar4" class="gpsBar"></div>
    </div>
    <div id="gpsStrengthText">NO FIX</div>
  </div>

  <div id="main">
    <div id="leftPanel">
      <button class="sideButton" onclick="widthMinusSmall()">W -0.1</button>
      <button class="sideButton" onclick="widthMinus()">W -0.5</button>
      <button class="sideButton" onclick="widthMinusBig()">W -1.0</button>
    </div>

    <div id="centrePanel">
      <div id="offset" class="white">SET A POINT</div>
      <div id="arrow" class="white">--</div>
      <div id="coords">Lat/Lon: --</div>
    </div>

    <div id="rightPanel">
      <button class="sideButton" onclick="widthPlusSmall()">W +0.1</button>
      <button class="sideButton" onclick="widthPlus()">W +0.5</button>
      <button class="sideButton" onclick="widthPlusBig()">W +1.0</button>
    </div>
  </div>

  <div id="bottom">
    <button onclick="startGps()">START GPS</button>
    <button onclick="setA()">SET A</button>
    <button onclick="setB()">SET B</button>
    <button onclick="nudgeLeft()">NUDGE ←</button>
    <button onclick="nudgeRight()">NUDGE →</button>
    <button onclick="clearLine()">CLEAR</button>

    <button onclick="nextPreset()">PRESET</button>
    <button onclick="customWidth()">TYPE WIDTH</button>
    <button onclick="setDayMode()">DAY</button>
    <button onclick="setNightMode()">NIGHT</button>
    <button onclick="biggerText()">TEXT +</button>
    <button onclick="smallerText()">TEXT -</button>
  </div>
</div>

<script>
var current = null;
var pointA = null;
var pointB = null;
var implementWidth = loadNumber("implementWidth", 8.0);
var nudge = loadNumber("nudge", 0.0);
var speedKmh = 0.0;
var watchId = null;
var R = 6378137.0;
var presets = [4, 6, 8, 9, 10, 12, 15, 18, 24, 27, 30, 36];
var presetIndex = 2;
var textScale = loadNumber("textScale", 1.0);

function $(id) { return document.getElementById(id); }

function loadNumber(key, fallback) {
  try {
    var v = localStorage.getItem(key);
    if (v === null) return fallback;
    var n = parseFloat(v);
    return isNaN(n) ? fallback : n;
  } catch(e) { return fallback; }
}

function saveSettings() {
  try {
    localStorage.setItem("implementWidth", implementWidth);
    localStorage.setItem("nudge", nudge);
    localStorage.setItem("textScale", textScale);
  } catch(e) {}
}

function applyTextScale() {
  $("offset").style.fontSize = Math.round(52 * textScale) + "px";
  $("offset").style.lineHeight = Math.round(58 * textScale) + "px";
  $("arrow").style.fontSize = Math.round(92 * textScale) + "px";
  $("arrow").style.lineHeight = Math.round(94 * textScale) + "px";
}

function biggerText() {
  textScale += 0.05;
  if (textScale > 1.25) textScale = 1.25;
  saveSettings();
  applyTextScale();
}

function smallerText() {
  textScale -= 0.05;
  if (textScale < 0.75) textScale = 0.75;
  saveSettings();
  applyTextScale();
}

function degToRad(d) { return d * Math.PI / 180.0; }

function latLonToLocalMetres(origin, p) {
  var lat0 = degToRad(origin.lat);
  var dLat = degToRad(p.lat - origin.lat);
  var dLon = degToRad(p.lon - origin.lon);
  return { x: dLon * Math.cos(lat0) * R, y: dLat * R };
}

function setGpsStrength(accuracy) {
  var bars = [$("bar1"), $("bar2"), $("bar3"), $("bar4")];
  var level = 0;
  var colour = "#ff4444";
  var label = "NO FIX";

  if (accuracy && accuracy > 0) {
    if (accuracy <= 5) {
      level = 4; colour = "#00ff00"; label = "STRONG";
    } else if (accuracy <= 10) {
      level = 3; colour = "#00ff00"; label = "GOOD";
    } else if (accuracy <= 25) {
      level = 2; colour = "#ffff00"; label = "FAIR";
    } else {
      level = 1; colour = "#ff4444"; label = "WEAK";
    }
  }

  for (var i = 0; i < bars.length; i++) {
    bars[i].style.background = (i < level) ? colour : "#333";
  }

  $("gpsStrengthText").innerHTML = label;
  $("gpsStrengthText").style.color = colour;
}

function setGpsStatus(text, detail, cls) {
  $("gpsStatus").innerHTML = text;
  $("gpsStatus").className = "topBox " + cls;
  $("gpsDetail").innerHTML = detail || "";
}

function updateWidthLine(swath) {
  $("width").innerHTML = "Width " + implementWidth.toFixed(1) +
    "m | Sw " + swath +
    " | N " + nudge.toFixed(1);
}

function calculateGuidance() {
  updateWidthLine(0);

  if (!current) {
    $("offset").innerHTML = "NO GPS";
    $("arrow").innerHTML = "--";
    return;
  }

  if (!pointA) {
    $("offset").innerHTML = "SET A POINT";
    $("arrow").innerHTML = "--";
    $("offset").className = "white";
    $("arrow").className = "white";
    return;
  }

  if (!pointB) {
    $("offset").innerHTML = "DRIVE, THEN SET B";
    $("arrow").innerHTML = "--";
    $("offset").className = "yellow";
    $("arrow").className = "yellow";
    return;
  }

  var b = latLonToLocalMetres(pointA, pointB);
  var p = latLonToLocalMetres(pointA, current);

  var len = Math.sqrt(b.x * b.x + b.y * b.y);
  if (len < 2.0) {
    $("offset").innerHTML = "BAD A-B LINE";
    $("arrow").innerHTML = "--";
    return;
  }

  var ux = b.x / len;
  var uy = b.y / len;

  var cross = p.x * (-uy) + p.y * ux;
  cross += nudge;

  var swath = Math.round(cross / implementWidth);
  var target = swath * implementWidth;
  var error = cross - target;
  var absErr = Math.abs(error);

  updateWidthLine(swath);

  if (absErr < 0.25) {
    $("offset").innerHTML = "ON LINE";
    $("arrow").innerHTML = "||";
    $("offset").className = "green";
    $("arrow").className = "green";
  } else if (error < 0) {
    $("offset").innerHTML = absErr.toFixed(1) + " m LEFT";
    $("arrow").innerHTML = "← ← ←";
    $("offset").className = "yellow";
    $("arrow").className = "yellow";
  } else {
    $("offset").innerHTML = absErr.toFixed(1) + " m RIGHT";
    $("arrow").innerHTML = "→ → →";
    $("offset").className = "yellow";
    $("arrow").className = "yellow";
  }
}

function setA() {
  if (!current) { alert("No GPS position yet. Press START GPS and wait for GPS FIX OK."); return; }
  pointA = { lat: current.lat, lon: current.lon };
  pointB = null;
  $("offset").innerHTML = "A SET";
  $("arrow").innerHTML = "DRIVE";
  calculateGuidance();
}

function setB() {
  if (!current || !pointA) { alert("Set A first, then drive forward 20-50 metres and set B."); return; }
  pointB = { lat: current.lat, lon: current.lon };
  calculateGuidance();
}

function clearLine() {
  pointA = null;
  pointB = null;
  nudge = 0.0;
  saveSettings();
  calculateGuidance();
}

function nudgeLeft() { nudge -= 0.5; saveSettings(); calculateGuidance(); }
function nudgeRight() { nudge += 0.5; saveSettings(); calculateGuidance(); }

function changeWidth(delta) {
  implementWidth += delta;
  if (implementWidth < 0.5) implementWidth = 0.5;
  saveSettings();
  calculateGuidance();
}

function widthMinusSmall() { changeWidth(-0.1); }
function widthPlusSmall() { changeWidth(0.1); }
function widthMinus() { changeWidth(-0.5); }
function widthPlus() { changeWidth(0.5); }
function widthMinusBig() { changeWidth(-1.0); }
function widthPlusBig() { changeWidth(1.0); }

function nextPreset() {
  presetIndex++;
  if (presetIndex >= presets.length) presetIndex = 0;
  implementWidth = presets[presetIndex];
  saveSettings();
  calculateGuidance();
}

function customWidth() {
  var v = prompt("Enter implement width in metres", implementWidth.toFixed(1));
  if (v === null) return;
  var n = parseFloat(v);
  if (isNaN(n) || n <= 0) { alert("Enter a valid width, for example 8 or 12.5"); return; }
  implementWidth = n;
  saveSettings();
  calculateGuidance();
}

function setDayMode() {
  document.body.style.background = "#ffffff";
  document.body.style.color = "#000000";
  $("app").style.background = "#ffffff";
}

function setNightMode() {
  document.body.style.background = "#000000";
  document.body.style.color = "#ffffff";
  $("app").style.background = "#000000";
}

function startGps() {
  setGpsStrength(0);
  if (!navigator.geolocation) {
    setGpsStatus("GPS: NOT SUPPORTED", "No browser GPS.", "red");
    return;
  }

  if (watchId !== null) {
    setGpsStatus("GPS: STARTED", "Waiting for fix.", "yellow");
    return;
  }

  setGpsStatus("GPS: STARTING", "Allow location. Go outside.", "yellow");

  try {
    watchId = navigator.geolocation.watchPosition(
      function(pos) {
        var lat = pos.coords.latitude;
        var lon = pos.coords.longitude;
        var accuracy = pos.coords.accuracy;
        var spd = pos.coords.speed;

        current = { lat: lat, lon: lon };

        if (spd !== null && !isNaN(spd)) speedKmh = spd * 3.6;

        var accText = accuracy ? accuracy.toFixed(1) : "?";
        var cls = (accuracy && accuracy <= 10) ? "green" : "yellow";

        setGpsStrength(accuracy);
        setGpsStatus("GPS: FIX OK", "Acc " + accText + "m", cls);
        $("speed").innerHTML = speedKmh.toFixed(1) + " km/h";
        $("coords").innerHTML = lat.toFixed(6) + ", " + lon.toFixed(6);

        calculateGuidance();
      },
      function(err) {
        var msg = "Unknown GPS error";
        if (err.code === 1) msg = "Permission denied";
        if (err.code === 2) msg = "Position unavailable";
        if (err.code === 3) msg = "GPS timeout";
        setGpsStrength(0);
        setGpsStatus("GPS ERROR", msg, "red");
        watchId = null;
      },
      { enableHighAccuracy: true, maximumAge: 0, timeout: 30000 }
    );
  } catch(e) {
    setGpsStatus("GPS ERROR", e.message, "red");
    watchId = null;
  }
}

function isStandaloneMode() {
  return window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
}

function setupFullscreenMode() {
  if (!isStandaloneMode()) {
    var h = $("installHint");
    if (h) h.style.display = "block";
  }

  document.addEventListener("touchmove", function(e) {
    e.preventDefault();
  }, false);
}

setupFullscreenMode();
setGpsStrength(0);
applyTextScale();
updateWidthLine(0);
calculateGuidance();
</script>
</body>
</html>
